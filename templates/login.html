<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmacia | Login</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>

<body>

<!-- LOADER -->
<div class="loader-overlay" id="loader">
  <div class="text-center">
    <div class="spinner"></div>
    <strong id="loaderText">Iniciando sesión...</strong>
    <div class="text-muted mt-2">Por favor espera</div>
  </div>
</div>

<div class="screen">

  <!-- PANEL IZQUIERDO -->
  <div class="left">
    <div>
      <h1 class="fw-bold">💊 Farmacia Online</h1>
      <p class="fs-5">Tu salud, a un clic de distancia</p>
    </div>
  </div>

  <!-- PANEL DERECHO -->
  <div class="right" id="panel">

    <!-- BOTÓN VOLVER -->
    <a href="/" class="btn btn-outline-secondary back-btn">
      ← 
    </a>

    <div class="slider">

      <!-- LOGIN -->
      <div class="form">
        <h2 class="mb-4">Iniciar sesión</h2>
        <form method="POST" action="/login" onsubmit="showLoader('login')">

          <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input type="text" name="name" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" name="password" class="form-control" required>
          </div>

          <button class="btn btn-danger w-100">Entrar</button>

          <div class="text-center mt-3">
            <a onclick="showRegister()" class="text-decoration-none fw-bold" style="cursor:pointer;">
              ¿No tienes cuenta? Regístrate
            </a>
          </div>
        </form>
      </div>

      <!-- REGISTRO -->
      <div class="form">
        <h2 class="mb-4">Crear cuenta</h2>
        <form method="POST" action="/register" onsubmit="showLoader('register')">

          <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input type="text" name="name" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" name="password" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Confirmar contraseña</label>
            <input type="password" name="confirm_password" class="form-control" required>
          </div>

          <button class="btn btn-danger w-100">Registrarme</button>

          <div class="text-center mt-3">
            <a onclick="showLogin()" class="text-decoration-none fw-bold" style="cursor:pointer;">
              Ya tengo cuenta
            </a>
          </div>
        </form>
      </div>

    </div>
  </div>
</div>

<script>
function showRegister() {
  document.getElementById("panel").classList.add("active");
}

function showLogin() {
  document.getElementById("panel").classList.remove("active");
}

function showLoader(type) {
  const loader = document.getElementById("loader");
  loader.style.display = "flex";
  document.getElementById("loaderText").textContent =
    type === 'register' ? 'Creando tu cuenta...' : 'Iniciando sesión...';
}
</script>

</body>
</html>
