<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmacia | Productos</title>
<meta http-equiv="Cache-Control" content="no-store" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">  
<link rel="stylesheet" href="{{ url_for('static', filename='products.css') }}">
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="spinner-border text-danger"></div>
  <div class="loader-bar"><span></span></div>
  <p class="mt-2">Cargando productos...</p>
</div>

<!-- HEADER -->
<div class="top-bar">
  <span class="back-btn" onclick="history.back()">←</span>
  <strong>Productos disponibles</strong>
      <input type="text" id="search" class="search-bar" placeholder="🔎 Buscar productos...">
</div>

<!-- CONTENIDO -->
<div class="container pb-5 mt-5">
  <div class="row g-4">

    {% for producto in products %}
    <div class="col-12 col-sm-6 col-md-3">
      <div class="card shadow-sm h-100 product-card">

        <img src="{{ url_for('static', filename=producto.image) }}"
             class="card-img-top product-img"
             alt="{{ producto.name }}">

        <div class="card-body text-center">
          <h6 class="card-title">{{ producto.name }}</h6>
          <p class="card-text fw-bold text-danger mb-2">
            {{ producto.price }} COP
          </p>

          <button class="btn btn-danger w-100">
            ➕ Agregar al carrito
          </button>
        </div>

      </div>
    </div>
    {% else %}
      <p>No hay productos disponibles.</p>
    {% endfor %}

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
window.onload = () => {
  setTimeout(() => {
    document.getElementById("loader").style.display = "none";
  }, 700);
};
</script>
<script>
  if (window.history.replaceState) {
    window.history.replaceState(null, null, window.location.href);
  }
</script>
</body>
</html>
